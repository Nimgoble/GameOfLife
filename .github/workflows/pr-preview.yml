name: PR Preview Image

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write

jobs:
  build_preview_image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: src/GameOfLife.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gameoflife:pr-${{ github.event.pull_request.number }}
            ghcr.io/${{ github.repository_owner }}/gameoflife:pr-${{ github.event.pull_request.number }}-${{ github.sha }}

      - name: Output preview image
        run: echo "Preview image pushed: ghcr.io/${{ github.repository_owner }}/gameoflife:pr-${{ github.event.pull_request.number }}"
