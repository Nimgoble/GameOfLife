name: Azure SQL Maintenance

# This workflow performs Azure SQL-specific tasks only (create DB if missing,
# optionally create a firewall rule) and can also run EF Core migrations using
# a supplied connection string. The application is hosted on Render, so we do
# NOT deploy any Web App here. Run manually (workflow_dispatch) when you want
# to perform DB maintenance or to run migrations from CI.

on:
  workflow_dispatch:
    inputs:
      addFirewall:
        description: 'Add temporary firewall rule for the current runner IP? (true/false)'
        required: false
        default: 'false'
      runMigrations:
        description: 'Run dotnet ef database update using AZURE_SQL_CONNECTIONSTRING? (true/false)'
        required: false
        default: 'true'

permissions:
  contents: read

jobs:
  # Optional: run Azure CLI tasks (create DB, firewall) only when AZURE_CREDENTIALS
  # secret is configured. This allows infra owners to perform management tasks.
  azure-sql:
    if: ${{ secrets.AZURE_CREDENTIALS != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create database if it does not exist
        env:
          AZ_RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZ_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZ_DB: ${{ secrets.AZURE_SQL_DB }}
        run: |
          if [ -z "$AZ_RG" ] || [ -z "$AZ_SERVER" ] || [ -z "$AZ_DB" ]; then
            echo "Please set AZURE_RESOURCE_GROUP, AZURE_SQL_SERVER and AZURE_SQL_DB in repository secrets.";
            exit 1;
          fi
          echo "Ensuring database $AZ_DB exists on server $AZ_SERVER (resource group: $AZ_RG)";
          az sql db show --resource-group "$AZ_RG" --server "$AZ_SERVER" --name "$AZ_DB" >/dev/null 2>&1 || \
            az sql db create --resource-group "$AZ_RG" --server "$AZ_SERVER" --name "$AZ_DB" --service-objective Basic

      - name: (Optional) Add temporary firewall rule for current GitHub Actions runner
        if: ${{ github.event.inputs.addFirewall == 'true' }}
        env:
          AZ_RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZ_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
        run: |
          # This adds a short-lived firewall rule allowing the current runner IP to connect.
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Adding firewall rule for $RUNNER_IP"
          az sql server firewall-rule create --resource-group "$AZ_RG" --server "$AZ_SERVER" --name "gha-temp-$(date +%s)" --start-ip-address "$RUNNER_IP" --end-ip-address "$RUNNER_IP"
          echo "Firewall rule created. Remove it manually in the Azure Portal when finished."

      - name: Output connection string template
        env:
          AZ_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZ_DB: ${{ secrets.AZURE_SQL_DB }}
        run: |
          echo "-- Connection string examples --"
          echo "SQL authentication (recommended for Render):"
          echo "Server=tcp:${AZ_SERVER}.database.windows.net,1433;Initial Catalog=${AZ_DB};User ID=<sql_user>;Password=<password>;Encrypt=True;TrustServerCertificate=False;MultipleActiveResultSets=False;Connection Timeout=30;"
          echo
          echo "Managed Identity / AAD (NOTE: Render is not in Azure; use only if you can supply a token):"
          echo "Server=tcp:${AZ_SERVER}.database.windows.net,1433;Initial Catalog=${AZ_DB};Encrypt=True;TrustServerCertificate=False;MultipleActiveResultSets=False;Connection Timeout=30;Authentication=Active Directory Default;"
          echo
          echo "Next steps:"
          echo " - Create a SQL user on the database (use SSMS or Azure Data Studio) and store the SQL-auth connection string as a Render environment variable (or repository secret)."
          echo " - In Render: set an environment variable (e.g., ConnectionStrings__DefaultConnection) with the SQL connection string so the API running on Render can connect to Azure SQL."

      - name: Reminder to set GitHub/Render secrets
        run: |
          echo "This workflow does not set repository secrets automatically."
          echo "Please add the connection string to your Render service environment variables and/or GitHub repository secrets (AZURE_SQL_CONNECTIONSTRING) before deploying the API to Render."

  # Migration job: runs dotnet ef database update using a supplied connection string.
  migrate:
    # Only run when a connection string is provided and the user didn't opt-out.
    if: ${{ secrets.AZURE_SQL_CONNECTIONSTRING != '' && github.event.inputs.runMigrations != 'false' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run EF Core migrations (dotnet ef database update)
        env:
          AZURE_SQL_CONNECTIONSTRING: ${{ secrets.AZURE_SQL_CONNECTIONSTRING }}
        run: |
          echo "Running migrations against Azure SQL using provided connection string..."
          # dotnet ef is available via the SDK when Microsoft.EntityFrameworkCore.Design is referenced.
          dotnet ef database update --project src/GameOfLife.Infrastructure --startup-project src/GameOfLife.Api --connection "$AZURE_SQL_CONNECTIONSTRING"

