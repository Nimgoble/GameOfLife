name: Build, Publish Image and Deploy to Render

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Clean build artifacts
        run: dotnet clean

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: src/GameOfLife.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/gameoflife:latest
            ghcr.io/${{ env.OWNER_LC }}/gameoflife:${{ github.sha }}

  deploy_to_render:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Render deploy hook not configured. Skipping deploy.";
            exit 0;
          fi

          echo "Triggering deploy for Render service $RENDER_SERVICE_ID"
          curl "$RENDER_DEPLOY_HOOK_URL"


# Notes:
# - Set secrets.RENDER_SERVICE_ID and secrets.RENDER_API_KEY in the repository settings.
# - Render will perform its own build/deploy step when the API is triggered for a connected service.
