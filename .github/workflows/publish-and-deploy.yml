name: Build, Publish Image and Deploy to Render

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: src/GameOfLife.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gameoflife:latest
            ghcr.io/${{ github.repository_owner }}/gameoflife:${{ github.sha }}

  deploy_to_render:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_SERVICE_ID" ] || [ -z "$RENDER_API_KEY" ]; then
            echo "Render credentials not configured. Skipping deploy.";
            exit 0;
          fi

          echo "Triggering deploy for Render service $RENDER_SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":true}' | jq .


# Notes:
# - Set secrets.RENDER_SERVICE_ID and secrets.RENDER_API_KEY in the repository settings.
# - Render will perform its own build/deploy step when the API is triggered for a connected service.
